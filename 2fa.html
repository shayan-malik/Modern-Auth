<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Factor Authentication</title>
    <link rel="stylesheet" href="output.css">
    <link rel="shortcut icon" href="images/security-system.png" type="image/x-icon">
</head>
<body class="bg-stone-900 text-white">
    <section class="flex justify-center pt-30">
        <div class="login bg-black w-100 h-75 rounded-2xl shadow-lg shadow-yellow-500/100">
            <h2 class="text-3xl font-medium text-yellow-500 text-center py-10">Two Factor Authentication</h2>

            <div class="input flex flex-col items-center">
                <input type="number" placeholder="Enter 6 digit code" required class="bg-white text-black rounded-lg h-12 w-80 mb-5 pl-3">
                <button class="bg-yellow-500 w-80 h-10 rounded-lg text-black font-medium hover:bg-stone-500 hover:text-white"><a href="dashboard.html">Submit</a></button>

                <div class="pass pt-5">
                    <a href="forgot-password.html" class="pr-2 text-yellow-500 hover:underline">Resend Code</a> |
                    <a href="index.html" class="pl-2 text-yellow-500 hover:underline" >Back to Home</a>

                </div>
        
            </div>
        </div>
    </section>
</body>
</html>
