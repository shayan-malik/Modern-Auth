<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="output.css">
    <link rel="shortcut icon" href="images/security-system.png" type="image/x-icon">
</head>
<body class="bg-stone-900 text-white">
    <section class="flex justify-center pt-15">
        <div class="login bg-black w-100 h-130 rounded-2xl shadow-lg shadow-yellow-500/100">
            <h2 class="text-3xl font-medium text-yellow-500 text-center py-10">SignUp Page</h2>

            <div class="input flex flex-col items-center">
                <input type="text" placeholder="Name" required class="bg-white text-black rounded-lg h-12 w-80 mb-5 pl-3">
                <input type="email" placeholder="Email" required class="bg-white text-black rounded-lg h-12 w-80 mb-5 pl-3">
                <input type="password" placeholder="Password" required class="bg-white text-black rounded-lg h-12 w-80 mb-5 pl-3">
                <input type="password" placeholder="Confirm Password" required class="bg-white text-black rounded-lg h-12 w-80 mb-5 pl-3">

                <button class="bg-yellow-500 w-80 h-10 rounded-lg text-black font-medium"><a href="login.html">Sign Up</a></button>
                
                <div class="pass pt-6">
                    <a href="index.html" class="pl-2 text-yellow-500 hover:underline" >Back to Home</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
